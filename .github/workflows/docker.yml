name: Docker

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    concurrency:
      group: docker-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read package version
        id: version
        run: |
          echo "value=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Detect version bump on default branch
        id: version_bump
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          previous_version=""
          if git show HEAD^:package.json > /tmp/previous-package.json 2>/dev/null; then
            previous_version=$(node -p 'JSON.parse(require("fs").readFileSync("/tmp/previous-package.json", "utf8")).version')
          fi

          if [ -z "$previous_version" ] || [ "$previous_version" != "${{ steps.version.outputs.value }}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ "v${{ steps.version.outputs.value }}" != "${{ github.ref_name }}" ]; then
            echo "Git tag ${GITHUB_REF_NAME} does not match package.json version ${{ steps.version.outputs.value }}"
            exit 1
          fi

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=${{ steps.version.outputs.value }},enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && steps.version_bump.outputs.changed == 'true' }}
            type=raw,value=${{ steps.version.outputs.value }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
